# moves.yaml — COMBAT V2. The catalog owns all math; the phone renders each
# character's live numbers from these formulas ("SMASH — 4d4+2" on the brick's
# phone). Moves are TAPPED, never classified from the drawing — the drawing
# supplies creativity, flavor, TRICK's condition, WILD CARD's interpretation,
# and combos only (GAME_DESIGN §4).
#
# damage/heal formulas may reference POW / SPD / WRD plus ceil()/floor(),
# e.g. "(1 + ceil(POW/2))d4 + 2" — evaluated per character by engine/dice.py.
# `stat` is added to the 2d6 attack roll ("none" = no attack roll).
# Self-buffs (SHIELD's +5 AC & reflect, movement's +1 dodge AC) live as
# conditions in conditions.yaml so duration/expiry/emoji come for free.
# `sfx` names the clip (web/host/assets/sfx/<name>.wav) the host plays when
# the move resolves; event stingers live in settings.yaml ui.audio.events_sfx.
#
# No-repeat rule: a combat move (anything without `move`) can't be picked two
# rounds in a row; ◀/▶ movement is exempt. Enforced server-side at submit time.

moves:
  smash:
    stat: power
    range: same_zone
    target: single_enemy
    damage: "(1 + ceil(POW/2))d4 + 2"     # POW 0: 1d4+2 … POW 6: 4d4+2
    auto_step: true    # no enemy in your zone → step toward target and swing
    button: "SMASH"
    desc: "Huge single hit. Get in their face."
    sfx: punch

  blast:
    stat: weird
    range: any
    target: zone_all
    friendly_fire: true
    damage: "(1 + floor(WRD/3))d4 + 3"    # one shared roll hits the whole zone
    button: "BLAST"
    desc: "Hits EVERYONE in a zone. Yes, everyone."
    sfx: boom

  trick:
    stat: weird
    range: any
    target: single_enemy
    damage: "1d6 + WRD"
    on_hit_condition: from_drawing   # AI picks from conditions.yaml by flavor
    button: "TRICK"
    desc: "Damage plus something nasty from your drawing."
    sfx: poof

  shield:
    stat: none
    range: any
    target: ally_or_self
    applies_condition: shielded      # +5 AC; misses by 3+ reflect 1d6 (conditions.yaml)
    button: "SHIELD"
    desc: "Big protection. Strong blocks reflect."
    sfx: shield

  rally:
    stat: none
    range: any
    target: ally_or_self
    heal: "1d6 + 2"
    cleanse: all                     # strips every debuff
    pumped_if_creativity: 2          # the buff is earned by a great drawing
    button: "RALLY"
    desc: "Heal, cleanse, and hype a teammate."
    sfx: sparkle

  wild:
    stat: weird
    range: any
    target: single_enemy
    damage: "2d8 + floor(WRD/2)"
    fumble_on_roll_lte: 3            # widest fumble band: natural 2d6 ≤ 3
    button: "WILD CARD"
    desc: "The AI decides what your drawing does. Gamble."
    sfx: zap

  move_l:
    stat: none
    target: self
    move: -1                         # absolute: one zone left, matches the TV
    applies_condition: dodging       # +1 AC this round (conditions.yaml)
    button: "◀ MOVE"
    desc: "Step one zone left, dodging as you go (+1 AC)."
    sfx: steps

  move_r:
    stat: none
    target: self
    move: 1
    applies_condition: dodging
    button: "MOVE ▶"
    desc: "Step one zone right, dodging as you go (+1 AC)."
    sfx: steps
