# moves.yaml — COMBAT V5. Five moves, ALL single-target. The catalog owns all
# math; the phone renders each character's live numbers from these formulas
# ("SMASH — 2d4+8" on the brick's phone). Moves are TAPPED, never classified
# from the drawing — the drawing supplies creativity, flavor, and combos only
# (GAME_DESIGN §4).
#
# THERE IS NO AC, NO ATTACK ROLL, NO DODGE (v5). Every selected move lands. The
# ONLY thing that reduces a hit is PROTECT's reflect shield. Damage/heal formulas
# set the *magnitude*, so outcomes vary in size, never in whether they land.
#
# damage/heal formulas may reference POW / SPD / WRD plus ceil()/floor()/
# max()/min()/avg(), e.g. "2d4 + avg(POW,SPD)" — evaluated per character by
# engine/dice.py. They must NOT spell out creativity: the resolver adds the flat
# creativity bonus (+0/+1/+3/+5) to every damage/heal result as a system rule
# (GAME_DESIGN §5), so a formula can't silently forget it.
#
# `stat` names the move's headline stat — the term the host readout prints
# ("🌀 Weird 5") and the phone button keys off. "avg(power,speed)" prints the
# higher of the two.
#
# Riders:
#   always_legal      the button is never greyed (BLAST, CHARGE — the fallbacks)
#   moves_to_target   CHARGE: rush into the target's zone before swinging
#   moves_one_zone    ESCAPE: slip one zone (player picks ◀/▶), then a ranged hit
#   acts_first        PROTECT resolves before every other move that round
#   applies_shield    PROTECT: cloak the target in a reflecting shield
#   same_zone_penalty BLAST: half damage (round up) point-blank
#
# `sfx` names the clip (web/host/assets/sfx/<name>.wav) the host plays when the
# move resolves; event stingers live in settings.yaml ui.audio.events_sfx.
#
# No-repeat rule: a move can't be picked two rounds in a row (button greys).
# Enforced server-side at submit time.

moves:
  smash:
    stat: power
    range: same_zone
    target: single_enemy
    damage: "2d4 + POW + 2"           # POW 0: 2d4+2 … POW 6: 2d4+8
    button: "SMASH"
    icon: "💥"
    desc: "Powerful melee hit on someone in your zone."
    sfx: punch

  blast:
    stat: weird
    range: any_zone
    target: single_enemy
    damage: "2d4 + WRD + 2"
    same_zone_penalty: half           # point-blank is clumsy — half damage (round up)
    always_legal: true                # the universal fallback (see legality rules)
    button: "BLAST"
    icon: "🔥"
    desc: "Powerful ranged hit on anyone, anywhere. Weak up close."
    sfx: boom

  charge:
    stat: "avg(power,speed)"
    range: any_zone
    target: single_enemy
    damage: "2d4 + avg(POW,SPD)"      # ~2/3 of SMASH
    moves_to_target: true             # rush into the target's zone, then hit
    always_legal: true                # already adjacent → skip the move, just swing
    button: "CHARGE"
    icon: "🐗"
    desc: "Rush into their zone and hit them."
    sfx: charge

  escape:
    stat: speed
    range: any_zone
    target: single_enemy
    damage: "2d4 + SPD"               # ~2/3 of SMASH
    moves_one_zone: true              # slip one zone (◀/▶ chosen with the tap), then shoot
    button: "ESCAPE"
    icon: "💨"
    desc: "Slip one zone away, then shoot from there."
    sfx: whoosh

  protect:
    stat: weird
    range: any_zone
    target: ally
    heal: "1d6 + WRD"                 # + creativity: the drawing IS the medicine
    acts_first: true                  # PROTECT always resolves before everything
    applies_shield: true             # cloak the ally: reflect_per_weird × WRD (cap)
    button: "PROTECT"
    icon: "🛡️"
    desc: "Heal a teammate and cloak them in a reflecting shield."
    sfx: shield
