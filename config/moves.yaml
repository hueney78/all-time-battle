# moves.yaml — COMBAT V2.1. The catalog owns all math; the phone renders each
# character's live numbers from these formulas ("SMASH — 4d4+2" on the brick's
# phone). Moves are TAPPED, never classified from the drawing — the drawing
# supplies creativity, flavor, WILD CARD's interpretation, and combos only
# (GAME_DESIGN §4).
#
# damage/heal formulas may reference POW / SPD / WRD plus ceil()/floor(),
# e.g. "(1 + ceil(POW/2))d4 + 2" — evaluated per character by engine/dice.py.
# Heal formulas may also reference CRE (the drawing's creativity bonus):
# RALLY's healing is earned by the art. `stat` is added to the 2d6 attack
# roll ("none" = no attack roll).
# `ac_bonus` is a round-scoped defensive buff: SHIELD grants it to every ally
# in the caster's zone (target: zone_allies), movement grants its own +1
# dodge. `same_zone_penalty: half` (SHOOT) halves damage point-blank.
# `sfx` names the clip (web/host/assets/sfx/<name>.wav) the host plays when
# the move resolves; event stingers live in settings.yaml ui.audio.events_sfx.
#
# No-repeat rule: a combat move (anything without `move`) can't be picked two
# rounds in a row; ◀/▶ movement is exempt. Enforced server-side at submit time.

moves:
  smash:
    stat: power
    range: same_zone
    target: single_enemy
    damage: "(1 + ceil(POW/2))d4 + 2"     # POW 0: 1d4+2 … POW 6: 4d4+2
    auto_step: true    # no enemy in your zone → step toward target and swing
    button: "SMASH"
    desc: "Huge single hit. Get in their face."
    sfx: punch

  blast:
    stat: weird
    range: any
    target: zone_all
    friendly_fire: true
    damage: "(1 + floor(WRD/3))d4 + 3"    # one shared roll hits the whole zone
    button: "BLAST"
    desc: "Hits EVERYONE in a zone. Yes, everyone."
    sfx: boom

  shoot:
    stat: weird
    range: any
    target: single_enemy
    damage: "(1 + ceil(WRD/2))d4 + 1"     # a notch below SMASH: ranged is safer
    same_zone_penalty: half               # point-blank = half damage (round up)
    button: "SHOOT"
    desc: "Hit anyone, anywhere. Weaker up close."
    sfx: whoosh

  shield:
    stat: none
    target: zone_allies                   # ALL teammates in the caster's zone, incl. self
    ac_bonus: 4
    reflect_miss_margin: 3                # attacks missing by 3+ deal reflect_damage back
    reflect_damage: "1d6"
    button: "SHIELD"
    desc: "Protect everyone in your zone. Strong blocks reflect."
    sfx: shield

  rally:
    stat: none
    range: any
    target: ally_or_self
    heal: "1d6 + CRE"                     # the drawing IS the medicine
    button: "RALLY"
    desc: "Heal a teammate. Great drawings heal more."
    sfx: sparkle

  wild:
    stat: weird
    range: any
    target: single_enemy
    damage: "2d8 + floor(WRD/2)"
    fumble_on_roll_lte: 3            # widest fumble band: natural 2d6 ≤ 3
    button: "WILD CARD"
    desc: "The AI decides what your drawing does. Gamble."
    sfx: zap

  move_l:
    stat: none
    target: self
    move: -1                         # absolute: one zone left, matches the TV
    ac_bonus: 1                      # dodging on the move: +1 AC this round
    button: "◀ MOVE"
    desc: "Step one zone left, dodging as you go (+1 AC)."
    sfx: steps

  move_r:
    stat: none
    target: self
    move: 1
    ac_bonus: 1
    button: "MOVE ▶"
    desc: "Step one zone right, dodging as you go (+1 AC)."
    sfx: steps
