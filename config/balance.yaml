# balance.yaml — every tunable number in one place.
# Change a value → start a new room → new rules apply immediately.
# See GAME_DESIGN.md §3–8 and §14 for the tuning guide.

# --- Character stats (COMBAT V6: 0–6 on a budget of 9) ---
# HP = hp_base + hp_per_power*Power + hp_per_weird*Weird + hp_per_speed*Speed
#    = 27 + 2*Power + Weird                    (range 27–39)
# v6: Speed grants NO HP — fast fighters already act first, so making them tanky
# too let Speed dominate. Set hp_per_speed > 0 to give Speed some survivability back.
hp_base: 27          # want faster games? lower this
hp_per_power: 2
hp_per_weird: 1
hp_per_speed: 0      # v6: Speed gives no HP (was floor(Speed/2) in v5)
# AI distributes stats summing to stat_budget; each stat clamped to [stat_min, stat_max]
stat_budget: 9
stat_min: 0          # a stat of 0 is characterful, not broken
stat_max: 6

# --- Resolution (COMBAT V5: no AC, no attack roll, no dodge) ---
# Every selected move lands. effect = the move's dice + stat + a flat creativity
# bonus. The ONLY thing that reduces a hit is PROTECT's reflect shield.

# --- PROTECT's reflect shield — the only damage reduction in the game ---
# A shielded ally absorbs reflect_per_weird * caster's Weird of each incoming
# hit (capped at reflect_cap) and bounces exactly that much back at the attacker.
reflect_per_weird: 0.05   # 5% × Weird; at Weird 6 that's 30% = the cap
reflect_cap: 0.30

# --- Creativity bonuses (added DIRECTLY to the effect — there is no roll) ---
# Judge idea creativity, not drawing skill. Tier 3 is the "DEVASTATING" beat.
creativity_tier_0: 0
creativity_tier_1: 1
creativity_tier_2: 3
creativity_tier_3: 5   # "table losing it" — lower to 4 to reduce variance

# A stale drawing (similar_to_previous) scores creativity 0 — no extra penalty.

# --- Combo rules ---
# Both partners keep their own tapped moves; each gains this many creativity
# TIERS (so a tier-2 combo escalates to tier 3 and earns the DEVASTATING beat),
# and the narrator merges their beats into one named spectacle.
combo_tier_bonus: 1

# --- Arena Gremlin traps (GAME_DESIGN §10) ---
# A KO'd player plants a trap in a chosen zone; it persists until an enemy is in
# that zone at end of round, then fires this + creativity at one random enemy.
trap_damage: "1d4"

# --- Rubber-banding (kids mode, on by default) ---
# Losing team gets underdog_damage_bonus when down >= underdog_hp_share_threshold
# characters' worth of HP share.
underdog_enabled: true
underdog_hp_share_threshold: 2   # kids losing? lower to 1
underdog_damage_bonus: 1

# --- Sudden death ---
# After max_rounds rounds: all damage gains sudden_death_damage_bonus.
max_rounds: 12
sudden_death_damage_bonus: 3
