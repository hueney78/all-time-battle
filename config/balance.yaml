# balance.yaml — every tunable number in one place.
# Change a value → start a new room → new rules apply immediately.
# See GAME_DESIGN.md §3–8 and §14 for the tuning guide.

# --- Character stats (COMBAT V2: 0–6 on a budget of 9) ---
# HP = hp_base + hp_per_power * Power   (20–32)
hp_base: 20          # want faster games? lower this
hp_per_power: 2
# AC = ac_base + Speed                  (10–16)
ac_base: 10
# AI distributes stats summing to stat_budget; each stat clamped to [stat_min, stat_max]
stat_budget: 9
stat_min: 0          # a stat of 0 is characterful, not broken
stat_max: 6

# --- Degrees of success (2d6 + stat + creativity + modifiers vs AC) ---
crit_margin: 5       # beat AC by >= this (or natural 12) → crit; too swingy? raise
crit_damage_mult: 2.0
# Fumble: natural 2 (WILD CARD widens the band via its fumble_on_roll_lte).
fumble_self_damage: 3    # flat self-damage on a fumble — the narrator handles the shame

# --- Creativity bonuses (added to the 2d6 roll) ---
# Judge idea creativity, not drawing skill. Under 2d6, +2 is enormous.
creativity_tier_0: 0
creativity_tier_1: 1
creativity_tier_2: 2
creativity_tier_3: 4   # "table losing it" — lower to 3 to reduce variance
# A stale drawing (similar_to_previous) scores creativity 0 — no extra penalty.

# --- Combo rules ---
# Both partners keep their own tapped moves; each gains this roll bonus and the
# narrator merges their beats into one named spectacle.
combo_bonus: 2

# --- Rubber-banding (kids mode, on by default) ---
# Losing team gets underdog_attack_bonus when down >= underdog_hp_share_threshold
# characters' worth of HP share.
underdog_enabled: true
underdog_hp_share_threshold: 2   # kids losing? lower to 1
underdog_attack_bonus: 1

# --- Sudden death ---
# After max_rounds rounds: all attacks gain sudden_death_attack_bonus, healing disabled.
max_rounds: 12
sudden_death_attack_bonus: 2
