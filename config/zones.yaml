# zones.yaml — arena zone graph.
# Adding a new zone (e.g. High Ground) requires ONLY this file — zero Python changes.
# The resolver reads `modifiers` generically; the AI prompts receive this zone list automatically.
#
# Known modifier keys (COMBAT V4 — no AC, so no ac_bonus/attack_bonus):
#   damage_bonus            flat damage added to hits made FROM this zone
#   incoming_damage_bonus   flat damage added to hits landing IN this zone
#   dodge_bonus             added to the dodge chance of anyone standing here
#   incoming_dodge_penalty  subtracted from it — exposed ground is hard to dodge on
# Zone-level keys:     capacity (optional int), entry_cost (default 1)
# Unknown keys log a warning rather than failing the room (GAME_DESIGN §6).
#
# Uncomment the high_ground block below to enable it:
#
# - id: high_ground
#   name: "The High Ground"
#   adjacent: [frontline]
#   capacity: 2
#   entry_cost: 2
#   tags: [elevated]
#   modifiers:
#     damage_bonus: 1                  # it's over, Anakin
#     incoming_dodge_penalty: 0.10     # exposed up here: harder to dodge

zones:
  - id: glitter_back
    name: "Team A Backline"
    adjacent: [frontline]
    tags: [backline, team_a]
    modifiers: {}

  - id: frontline
    name: "The Pit"
    adjacent: [glitter_back, thunder_back]
    tags: [contested]
    modifiers: {}

  - id: thunder_back
    name: "Team B Backline"
    adjacent: [frontline]
    tags: [backline, team_b]
    modifiers: {}

rules:
  melee_requires_same_zone: true    # SMASH; auto_step closes 1 zone toward the target
  ranged_any_zone: true
  move_buttons: [move_l, move_r]    # movement is tapped, absolute, edge-disabled
