# zones.yaml — arena zone graph.
# Adding a new zone (e.g. High Ground) requires ONLY this file — zero Python changes.
# The resolver reads `modifiers` generically; the AI prompts receive this zone list automatically.
#
# Known modifier keys (COMBAT V5 — no AC and no dodge, so no ac/attack/dodge keys):
#   damage_bonus            flat damage added to hits made FROM this zone
#   incoming_damage_bonus   flat damage added to hits landing IN this zone
#   heal_bonus              flat healing added to heals landing IN this zone
# Zone-level keys:     capacity (optional int), entry_cost (default 1)
# Unknown keys log a warning rather than failing the room (GAME_DESIGN §6).
#
# Movement is not a button in v5 — CHARGE rushes into a target's zone and ESCAPE
# slips one zone (player picks ◀/▶). The list order below is the arena's
# left→right order on the TV, which ESCAPE's direction and CHARGE's pathing follow.
#
# Uncomment the high_ground block below to enable it:
#
# - id: high_ground
#   name: "The High Ground"
#   adjacent: [frontline]
#   capacity: 2
#   entry_cost: 2                      # steep climb
#   tags: [elevated]
#   modifiers:
#     damage_bonus: 1                  # it's over, Anakin
#     incoming_damage_bonus: 2         # exposed up here: hits land harder

zones:
  - id: glitter_back
    name: "Team A Backline"
    adjacent: [frontline]
    tags: [backline, team_a]
    modifiers: {}

  - id: frontline
    name: "The Pit"
    adjacent: [glitter_back, thunder_back]
    tags: [contested]
    modifiers: {}

  - id: thunder_back
    name: "Team B Backline"
    adjacent: [frontline]
    tags: [backline, team_b]
    modifiers: {}

rules:
  melee_requires_same_zone: true    # SMASH; CHARGE closes the gap for you
  ranged_any_zone: true             # BLAST / CHARGE / ESCAPE reach any zone
