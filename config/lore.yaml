# config/lore.yaml — optional family in-jokes the announcers may sprinkle in
# (GAME_DESIGN §11.3). Replace these examples with your household's own terms;
# leave `lore:` empty (or set `usage: never`) to turn the feature off entirely.
# A few entries are sampled into each game's narrate / character-intro / awards
# prompts with instructions to use them sparingly and only when they fit.
#
# usage: how much lore to lean on — never | occasional | frequent
lore:
  - term: "the Kevin Special"
    definition: "any move that looks cool but accomplishes nothing"
  - term: "yeet"
    definition: "to throw someone or something with great force"
  - term: "tough"
    definition: "when something is overpowered or strong or cool or buff"
  - term: "that's aura"
    definition: "when something is cool or amazing"
  - term: "yeet"
    definition: "to throw someone or something with great force"
  - term: "farming"
    definition: "when someone is continuing to do something good over and over again, like farming for XP or loot"
