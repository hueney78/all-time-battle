# hazards.yaml — the Arena Gremlin hazard palette (GAME_DESIGN.md §10).
#
# A KO'd player becomes an Arena Gremlin and draws ONE hazard each round. The AI
# maps the drawing to exactly one hazard below; the resolver drops it on a random
# zone, hitting every living fighter standing there. Hazards are damage-or-push
# only (v2.1 — no status effects). Adding a hazard is a YAML-only change (zero
# Python) — `desc` is injected into the classifier prompt, so write it visually.
#
# Effect keys (a hazard uses one):
#   damage: "<dice spec>"    roll once, subtract from every occupant of the zone
#   forces_move: true        bump occupants to a random adjacent zone

hazards:
  bees:
    damage: "1d4"
    emoji: "🐝"
    sfx: buzz
    desc: "bees, wasps, hornets, angry swarms — anything that keeps stinging"

  spikes:
    damage: "1d4"
    emoji: "📌"
    sfx: splat
    desc: "spikes, tacks, cacti, caltrops, lava patches — anything sharp or searing underfoot"

  banana_peel:
    forces_move: true
    emoji: "🍌"
    sfx: banana_slip
    desc: "slippery peels, oil slicks, marbles, ice — anything that sends you skidding away"

  trapdoor:
    forces_move: true
    emoji: "🕳️"
    sfx: whoosh
    desc: "pits, trapdoors, holes, chasms, portals — anything that yanks you elsewhere"
