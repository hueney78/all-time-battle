# conditions.yaml — curated condition registry.
# The AI may ONLY apply conditions from this list (enforced by schema + validator).
# Adding a condition = add a YAML block; zero Python changes required.
# The condition list is injected into AI prompts automatically.

conditions:
  burning:
    duration: 2
    tick_damage: 2
    cure_tags: [water, soggy]
    debuff: true
    emoji: "🔥"

  soggy:
    duration: 2
    modifiers: {power: -2}
    immunities: [burning]
    debuff: true
    emoji: "💧"

  sticky:
    duration: 2
    modifiers: {speed: -1}
    blocks_free_step: true
    debuff: true
    emoji: "🟢"

  prone:
    duration: 1
    stand_cost: 1
    modifiers: {ac: -1}
    debuff: true
    emoji: "🙃"

  frightened:
    duration: 2
    modifiers: {attack: -1}
    debuff: true
    emoji: "😱"

  embarrassed:
    duration: 2
    modifiers: {attack: -1}
    trigger: "fumble"
    debuff: true
    emoji: "😳"

  # Rage: an attack buff with a defensive downside — not something `cleanse`
  # should strip, so it is intentionally not tagged as a debuff.
  enraged:
    duration: 2
    modifiers: {attack: 1, ac: -1}
    emoji: "😡"

  sparkly:
    duration: 2
    incoming_attack_bonus: 1
    debuff: true
    emoji: "✨"

  pumped:
    duration: 2
    modifiers: {attack: 1}
    emoji: "💪"

  confused:
    duration: 1
    randomize_targets: true
    debuff: true
    emoji: "🌀"

  # A single stinging tick — the Arena Gremlin "bees" hazard (GAME_DESIGN §10).
  stung:
    duration: 1
    tick_damage: 1
    debuff: true
    emoji: "🐝"

  # SHIELD (COMBAT V2): big protection — and strong blocks reflect. An attack
  # that misses a shielded target by reflect_miss_margin+ deals reflect_damage
  # back to the attacker.
  shielded:
    duration: 1
    modifiers: {ac: 5}
    reflect_miss_margin: 3
    reflect_damage: "1d6"
    emoji: "🛡"

  # Movement's dodge (COMBAT V2): ◀/▶ grant +1 AC that round.
  dodging:
    duration: 1
    modifiers: {ac: 1}
    emoji: "💨"
