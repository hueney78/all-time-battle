server:
  host: "0.0.0.0"
  port: 8000

game:
  max_players: 6
  min_players: 2
  room_code_length: 4
  montage_every_rounds: 3   # Power-Up Montage cadence (GAME_DESIGN §10.1)

timers:
  draw_characters_seconds: 90
  draw_action_seconds: 75
  montage_seconds: 20     # Power-Up Montage bonus drawing phase
  warning_seconds: 10     # pulse warning before auto-submit
  beat_seconds: 15         # host reveal pacing (host "next" button overrides)

ai:
  classify_model: "claude-haiku-4-5"
  narrate_model: "claude-sonnet-4-6"
  timeout_seconds: 20
  max_retries: 1
  max_image_size_bytes: 200000   # 200 KB per PNG
  image_px: 512                  # canvas export size

# Presentation knobs shipped to the browser as window.DOODLE_CONFIG (host + player).
# The sand token is shared: it colors the arena floor AND the drawing canvas so
# submitted PNGs blend into the battlefield; erasers restore it (not white).
ui:
  canvas_background_color: "#E8D5A8"   # arena floor + drawing canvas + eraser fill
  arena_background: ""                 # optional custom arena image (empty = CSS colosseum)
  action_canvas_character_scale: 0.5   # prefill scale of the character on the action canvas
  reveal_action_zoom_scale: 1.8        # how far the acting drawing zooms during its beat
  reveal_action_zoom_seconds: 2.5      # how long the zoom holds before settling
  float_number_seconds: 1.5            # floating damage/heal number lifetime
  audience_recent_rounds: 3            # Crowd Favorite meter recency window (rounds)

snapshots:
  enabled: true
  dir: "snapshots"
