server:
  host: "0.0.0.0"
  port: 8000

game:
  max_players: 6
  min_players: 2
  room_code_length: 4
  montage_every_rounds: 3   # Power-Up Montage cadence (GAME_DESIGN §10.1)

timers:
  draw_characters_seconds: 240
  draw_action_seconds: 120
  montage_seconds: 40     # Power-Up Montage bonus drawing phase
  warning_seconds: 20     # pulse warning before auto-submit
  beat_seconds: 30         # server AFK safety net: force-proceed after beat_seconds × n_beats
                           # if the host never signals done (visual pace = ui.reveal_beat_seconds)

ai:
  classify_model: "claude-haiku-4-5"
  narrate_model: "claude-sonnet-4-6"
  timeout_seconds: 40
  max_retries: 1
  max_image_size_bytes: 200000   # 200 KB per PNG
  image_px: 512                  # canvas export size

# Presentation knobs shipped to the browser as window.DOODLE_CONFIG (host + player).
# The sand token is shared: it colors the arena floor AND the drawing canvas so
# submitted PNGs blend into the battlefield; erasers restore it (not white).
ui:
  canvas_background_color: "#E8D5A8"   # arena floor + drawing canvas + eraser fill
  arena_background: ""                 # optional custom arena image (empty = CSS colosseum)
  action_canvas_character_scale: 0.5   # prefill scale of the character on the action canvas
  montage_canvas_character_scale: 0.88 # full-size prefill on the montage upgrade canvas
  deliberation_filler_seconds: 3.5     # announcer filler line rotation during the interlude
  phase_splash_seconds: 2.0            # full-screen phase announcement before each draw
                                       # phase (phones tap-to-skip; draw timer starts after)
  splash_text:                         # per-phase splash copy; {round} is substituted;
    draw_characters: "Draw your Character!"        # phones show `gremlin` to KO'd players
    intros: "🥁 Meet the Fighters! 🥁"
    draw_action: "Round {round} — Draw your Move!"
    montage: "🎵 Upgrade your Character! 🎵"
    gremlin: "Draw a Hazard, Gremlin! 😈"
  reveal_action_zoom_scale: 2.8        # how far the acting drawing zooms during its beat
  reveal_action_zoom_seconds: 2.5      # how long the zoom holds before settling
  reveal_move_seconds: 0.7             # CHARGE/ESCAPE: how long a sprite takes to travel zones (v6)
  reveal_beat_seconds: 30.0             # seconds each announcer beat holds before auto-advancing
                                       # (0 = manual: host clicks "Next ▶" for every beat)
  float_number_seconds: 2.5            # floating damage/heal number lifetime
  audience_recent_rounds: 3            # Crowd Favorite meter recency window (rounds)
  combo_splash_seconds: 2.0            # how long the COMBO! splash holds on screen
  how_to_play:                         # lobby rules (§13): host lobby panel beside the QR,
                                       # + condensed on the player waiting screen. Fully editable.
    title: "How to Play"
    steps:                             # each line carries its own number emoji
      - "1️⃣ Draw your fighter — the AI sizes it up, names it, and gives it stats."
      - "2️⃣ Every round: TAP a move, PICK a target, then DRAW how your character does it."
      - "3️⃣ Your drawing is your power — creative, funny drawings earn big bonuses."
      - "4️⃣ Scheme with your teammate: drawings that work together trigger a COMBO."
      - "5️⃣ Knock out the other team to win — and if you're KO'd, you become a Gremlin and draw hazards!"
    tips:
      - "Weirder is better"
      - "Watch the Initiative Order — fast fighters act first."
  stands:                              # the Doodle Crowd (§15): past characters as
                                       # tiny spectators in the colosseum stands
    max: 14                            # how many show at once (0 disables the stands)
    rotate_seconds: 12                 # how often the visible handful reshuffles (0 = never)
  readout:                             # the plain-language damage line (§13):
                                       # 🔥 BLAST → 🎲 5 + 🌀 Weird 5 + ⭐⭐ Creative 3 = 13 damage
    enabled: true
    dice_icon: "🎲"
    star_icon: "⭐"                    # repeated once per creativity tier
    creative_label: "Creative"
    stat_icons: {power: "💪", speed: "⚡", weird: "🌀"}
    stat_labels: {power: "Power", speed: "Speed", weird: "Weird"}
    devastating_chip: "⭐⭐⭐ DEVASTATING!"   # tier 3 swaps the star chip for this
    damage_line: "{icon} {move} → {terms} = {total} damage"
    heal_line: "{icon} {move} → {terms} = {total} healed"
    reflect_line: "🛡️ {target}'s shield reflects {total} back at {attacker}!"
  instant_replay:                      # DEVASTATING/KO beats replay once in slow-mo
    enabled: true
    triggers: [devastating, ko]        # which attack results earn a replay
    slowmo_factor: 2.0                 # replay plays this many times slower
  audio:                               # host-page Web Audio manager (audio.js)
    enabled: true
    volume: 0.8                        # master volume 0..1 (host UI can override)
    pitch_variation: 0.10              # ±10% random playback rate so repeats vary
    sfx_dir: "/static/host/assets/sfx" # clips referenced by moves.yaml sfx keys
    events_sfx:                        # engine event/result → stinger clip
      devastating: crowd_roar          # creativity tier 3 — the spike moment
      reflect: boing                   # a shield throwing the blow back
      trap: comic_snap                 # an Arena Gremlin's trap springing
      ko: ko_bell
      combo: air_horn
      sudden_death: drumroll
      replay: replay                   # plays when the instant replay starts

snapshots:
  enabled: true
  dir: "snapshots"

# The Doodle Crowd (GAME_DESIGN §15): every character ever drawn persists here as
# a spectator in the stands across game nights. Delete files to prune the crowd.
gallery:
  enabled: true
  dir: "gallery"
  cap: 60            # max past characters kept (oldest pruned beyond this)
  cameo_count: 3     # gallery names dropped into the narrate prompt each round
