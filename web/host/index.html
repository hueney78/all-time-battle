<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Doodle Brawl — Host</title>
  <link rel="stylesheet" href="/static/shared/common.css">
  <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
  <style>
    /* Host (TV) page — faithful port of design/mockup_host_screen.html. */
    :root{
      --ink:#2B2338; --sand:#E8D5A8; --stone:#C9B282;
      --glitter:#E24FA0; --thunder:#2F6FE0; --gold:#F2B233;
      --dmg:#E23D3D; --heal:#3FB65C; --posit:#6FD4F2; --card:#FFF9EC;
      --zoom:1.8;
    }
    body{
      font-family:'Nunito',system-ui,sans-serif; color:var(--ink);
      background:linear-gradient(#BFE4F2,#9ED4EA 30%,var(--sand) 30.2%);
      min-height:100vh; padding:14px;
    }
    h1,h2,.display{font-family:'Titan One',cursive; letter-spacing:.5px}
    .muted{color:#2B233899}

    /* ---- lobby ---- */
    #lobby{text-align:center; margin-top:4vh}
    #lobby h1{font-size:40px}
    #code{font-size:5rem; font-weight:900; letter-spacing:.5rem; color:var(--glitter);
      font-family:'Titan One'}
    #joinurl{font-size:1.3rem}
    #players{display:flex; flex-wrap:wrap; gap:.6rem; justify-content:center; margin:1.2rem 0}
    .pill{padding:.5rem 1rem; border-radius:999px; color:#fff; font-weight:800;
      font-size:1.1rem; border:3px solid var(--ink)}
    #startBtn{font-family:'Titan One'; font-size:1.5rem; padding:1rem 2.4rem;
      background:var(--gold); color:var(--ink); border:4px solid var(--ink); border-radius:16px}
    #startBtn:disabled{opacity:.45}

    /* ---- stage ---- */
    #stage{display:none; grid-template-columns:180px 1fr; gap:14px; align-items:start}
    .stage-main{display:flex; flex-direction:column; gap:12px; min-width:0}

    /* initiative rail [left-side rail + stat strips] */
    .rail{background:var(--card); border:4px solid var(--ink); border-radius:22px;
      padding:12px 10px; display:flex; flex-direction:column; gap:10px}
    .rail h2{font-size:15px; text-align:center; line-height:1.1}
    #railSlots{display:flex; flex-direction:column; gap:10px}
    .slot{display:flex; align-items:center; gap:8px; background:#fff; border:3px solid var(--ink);
      border-radius:14px; padding:5px 7px; position:relative; transition:transform .35s ease}
    .slot .portrait{width:44px; height:44px; flex:none; background:center/contain no-repeat;
      border-radius:8px}
    .slot .order{position:absolute; top:-9px; left:-9px; width:20px; height:20px; border-radius:50%;
      background:var(--ink); color:#fff; font-weight:900; font-size:11px; display:grid; place-items:center}
    .slot .who{font-weight:900; font-size:11px; line-height:1}
    .slot .stats{display:flex; gap:5px; font-size:10.5px; font-weight:900; margin-top:2px}
    .slot .stats span{background:#F1EADB; border-radius:7px; padding:1px 4px; transition:background .2s}
    .slot .stats span.pulse{animation:statpulse 1.6s ease-in-out 2}
    @keyframes statpulse{50%{background:var(--gold)}}
    .slot.team-a{box-shadow:inset 4px 0 0 var(--glitter)}
    .slot.team-b{box-shadow:inset 4px 0 0 var(--thunder)}
    .gremlins{display:flex; flex-wrap:wrap; gap:4px; justify-content:center; font-size:18px;
      border-top:2px dashed #00000022; padding-top:8px}
    .gremlins:empty{display:none}

    .topbar{display:flex; align-items:center; gap:14px}
    .topbar h1{font-size:26px}
    .roundtitle{font-weight:800; font-size:15px; opacity:.85}
    #status{margin-left:auto; font-weight:800; opacity:.7}

    /* battlefield: CSS colosseum + 3 zone bands */
    .arena{position:relative; border:4px solid var(--ink); border-radius:24px; overflow:hidden;
      background:
        radial-gradient(circle at 50% 118%, #D9C08B 0 46%, transparent 46.5%),
        repeating-linear-gradient(90deg,var(--stone) 0 46px,#BBA476 46px 52px) 0 0/100% 88px no-repeat,
        linear-gradient(#F3E3B5 88px, var(--sand) 89px);
      height:56vh; min-height:340px;}
    .arena::before{content:""; position:absolute; top:14px; left:0; right:0; height:58px;
      background:radial-gradient(circle 26px at 30px 58px, #7d6a45 0 24px, transparent 25px);
      background-size:60px 58px; opacity:.55}
    .arena.custombg{background:#0000 center/cover no-repeat}
    .arena.custombg::before{display:none}
    .zones{position:absolute; inset:96px 0 0 0; display:grid; grid-template-columns:1fr 1.15fr 1fr}
    .zone{position:relative; border-left:3px dashed #00000022; display:flex;
      align-items:flex-end; justify-content:center; gap:20px; padding-bottom:16px}
    .zone:first-child{border-left:none}
    .zonelabel{position:absolute; top:6px; left:50%; transform:translateX(-50%);
      font-weight:900; font-size:12px; background:#ffffffc9; border:2px solid var(--ink);
      border-radius:10px; padding:1px 9px; white-space:nowrap}

    /* fighter sprites — the persistent action drawing is the sprite */
    .fighter{position:relative; width:120px; text-align:center; transition:transform .3s;
      transform-origin:bottom center}
    .fighter .pic{width:104px; height:104px; margin:0 auto; background:center/contain no-repeat;
      filter:drop-shadow(2px 3px 0 #00000025)}
    .nametag{font-family:'Titan One'; font-size:11.5px; background:#fff; border:2.5px solid var(--ink);
      border-radius:9px; padding:1px 5px; display:inline-block; margin-top:-2px}
    .hpbar{height:9px; border:2px solid var(--ink); border-radius:6px; background:#fff;
      margin:4px auto 0; width:96px; overflow:hidden}
    .hpbar > i{display:block; height:100%; background:var(--heal); transition:width .5s ease}
    .hpbar.low > i{background:var(--dmg)}
    .conds{font-size:14px; height:17px; margin-top:1px}
    .fighter.ko{opacity:.5; filter:grayscale(1)}
    .fighter.ko .pic{transform:rotate(12deg)}

    /* acting zoom [reveal_action_zoom_scale/_seconds] */
    .fighter.acting{transform:scale(var(--zoom)); z-index:5}
    .fighter.acting .nametag{background:var(--gold)}

    /* impact feedback [red border+shake / light-blue border+pop] */
    .fighter.hit{outline:4px solid var(--dmg); outline-offset:4px; border-radius:14px}
    .fighter.hit .pic{animation:shake .5s 2}
    .fighter.helped{outline:4px solid var(--posit); outline-offset:4px; border-radius:14px}
    .fighter.helped .pic{animation:pop 1.2s ease-in-out 1}
    @keyframes shake{25%{transform:translateX(-4px) rotate(-2deg)}75%{transform:translateX(4px) rotate(2deg)}}
    @keyframes pop{30%{transform:scale(1.14)}55%{transform:scale(1)}}

    /* floating combat numbers [red dmg / green heal, crit oversized] */
    .floatnum{position:absolute; left:50%; top:-6px; transform:translateX(-50%);
      font-family:'Titan One'; font-size:26px; color:var(--dmg);
      -webkit-text-stroke:1.5px #fff; animation:floatup 1.5s ease-out forwards; pointer-events:none}
    .floatnum.heal{color:var(--heal)}
    .floatnum.crit{font-size:38px}
    @keyframes floatup{0%{opacity:0; translate:0 14px}15%{opacity:1}100%{opacity:0; translate:0 -40px}}

    /* COMBO! splash + REPLAY banner [round-loop presentation] */
    .splash{position:absolute; inset:0; display:grid; place-items:center; z-index:20;
      pointer-events:none; visibility:hidden}
    .splash.show{visibility:visible}
    .splash .combotext{font-family:'Titan One'; font-size:42px; color:var(--gold);
      -webkit-text-stroke:2px var(--ink); background:#FFF9ECdd; border:4px solid var(--ink);
      border-radius:20px; padding:10px 26px; transform:rotate(-4deg) scale(0)}
    .splash.show .combotext{animation:comboin .45s cubic-bezier(.5,1.8,.4,1) forwards}
    @keyframes comboin{to{transform:rotate(-4deg) scale(1)}}
    .replaybanner{background:var(--gold); border:3px solid var(--ink); border-radius:12px;
      padding:4px 12px; font-family:'Titan One'; font-size:14px; transform:rotate(2deg);
      display:none; animation:replaypulse 1s infinite}
    .replaybanner.show{display:inline-block}
    @keyframes replaypulse{50%{transform:rotate(-2deg) scale(1.06)}}

    /* narration beats */
    .beatcard{background:var(--card); border:4px solid var(--ink); border-radius:18px;
      padding:12px 18px; font-size:18px; font-weight:800; display:flex; align-items:center;
      justify-content:space-between; gap:14px; min-height:3.2rem}
    #nextBtn{background:var(--gold); color:var(--ink); border:3px solid var(--ink);
      border-radius:12px; font-family:'Titan One'; font-size:15px; padding:6px 14px}

    /* tug-of-war meters [HP share + crowd favorite] */
    .meters{display:flex; flex-direction:column; gap:8px}
    .meter{display:grid; grid-template-columns:120px 1fr; align-items:center; gap:12px}
    .meter .label{font-family:'Titan One'; font-size:12.5px; text-align:right; line-height:1.05}
    .rope{position:relative; height:22px; border-radius:12px; border:3px solid var(--ink);
      background:linear-gradient(90deg,var(--glitter) 0 50%,var(--thunder) 50%)}
    .rope::before{content:""; position:absolute; inset:8px 4px; border-top:3px dashed #ffffff88}
    .knot{position:absolute; top:50%; translate:-50% -50%; width:30px; height:30px; border-radius:50%;
      background:var(--card); border:3.5px solid var(--ink); display:grid; place-items:center;
      font-size:14px; left:50%; transition:left 1s cubic-bezier(.5,1.6,.4,1)}
    .ticks{display:flex; justify-content:space-between; font-size:10px; font-weight:900; opacity:.65; padding:0 4px}

    /* ---- over ---- */
    #over{display:none; text-align:center; margin-top:8vh}
    #over h1{font-size:4rem; font-family:'Titan One'}

    /* transient AI status toast (e.g. "AI is napping — chaos mode") */
    #toast{position:fixed; top:10px; left:50%; transform:translateX(-50%) translateY(-140%);
      background:var(--gold); color:var(--ink); border:3px solid var(--ink); border-radius:14px;
      padding:8px 16px; font-weight:900; z-index:60; transition:transform .3s ease}
    #toast.show{transform:translateX(-50%) translateY(0)}
    @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
  </style>
</head>
<body>
  <div id="banner">Reconnecting…</div>
  <div id="toast"></div>

  <section id="lobby">
    <h1>Doodle Brawl</h1>
    <p class="muted">On your phone, open</p>
    <p id="joinurl" class="muted">…</p>
    <p class="muted">Room code</p>
    <div id="code">····</div>
    <div id="players"></div>
    <button id="startBtn" disabled>Start Game</button>
    <p class="muted" id="hint">Need 2–6 players.</p>
  </section>

  <section id="stage">
    <aside class="rail">
      <h2>Initiative<br>Order</h2>
      <div id="railSlots"></div>
      <div class="gremlins" id="gremlins"></div>
    </aside>
    <main class="stage-main">
      <div class="topbar">
        <h1 id="roundHead">Doodle Brawl</h1>
        <span class="roundtitle" id="roundTitle"></span>
        <span class="replaybanner" id="replayBanner">🔁 REPLAY!</span>
        <span id="status"></span>
      </div>
      <section class="arena" id="arena">
        <div class="splash" id="comboSplash"><span class="combotext"></span></div>
      </section>
      <section class="beatcard">
        <span id="capText" class="muted">Get ready…</span>
        <button id="nextBtn" class="hidden">Next ▶</button>
      </section>
      <section class="meters">
        <div class="meter"><span class="label">WHO'S<br>WINNING</span>
          <div><div class="rope"><span class="knot" id="knotHp">🪢</span></div>
            <div class="ticks"><span>GLITTER</span><span>THUNDER</span></div></div></div>
        <div class="meter"><span class="label">CROWD<br>FAVORITE</span>
          <div><div class="rope"><span class="knot" id="knotAud">📣</span></div>
            <div class="ticks"><span>GLITTER</span><span>THUNDER</span></div></div></div>
      </section>
    </main>
  </section>

  <section id="over">
    <h1 id="overTitle">🏆</h1>
    <p id="overMsg" class="muted"></p>
  </section>

  <script src="/static/shared/ws.js"></script>
  <script src="/static/host/arena.js"></script>
  <script>
  (function () {
    const SERVER_LAN_IP = "__SERVER_LAN_IP__";
    const CFG = window.DOODLE_CONFIG || {};
    const $ = (id) => document.getElementById(id);
    const BEAT_MS = 3200;          // client-side reveal pacing (host "next" overrides)
    const REPLAY_CFG = CFG.instant_replay || {};
    const SPLASH_MS = (CFG.combo_splash_seconds || 2) * 1000;
    const SCHEMING = ['Fighters scheming…', 'Pencils sharpening…', 'The crowd holds its breath…'];

    document.documentElement.style.setProperty('--sand', CFG.canvas_background_color || '#E8D5A8');
    document.documentElement.style.setProperty('--zoom', CFG.reveal_action_zoom_scale || 1.8);

    let sock, arena, seq = null;
    let charById = {};                 // pid → latest character delta (merged)
    const railSlotEls = {};            // pid → rail slot element
    const prevStatsById = {};          // pid → last-seen stats (for change-pulse)

    function joinBase() {
      const port = location.port ? (':' + location.port) : '';
      return location.protocol + '//' + SERVER_LAN_IP + port;
    }
    function upsert(c) { charById[c.player_id] = Object.assign({}, charById[c.player_id], c); }
    function clamp01(v) { return Math.max(0, Math.min(1, v == null ? 0.5 : v)); }
    function shortName(n) { return (n || '').length > 11 ? n.slice(0, 10) + '…' : (n || ''); }

    // ---- initiative rail ----
    function slotFor(pid) {
      let el = railSlotEls[pid];
      if (!el) {
        el = document.createElement('div');
        el.className = 'slot';
        el.dataset.pid = pid;
        el.innerHTML = '<span class="order"></span><div class="portrait"></div>' +
          '<div><div class="who"></div><div class="stats">' +
          '<span class="s-p"></span><span class="s-s"></span><span class="s-w"></span></div></div>';
        railSlotEls[pid] = el;
      }
      return el;
    }
    function setStat(span, icon, val, pid, key) {
      span.textContent = icon + (val == null ? '–' : val);
      const prev = prevStatsById[pid];
      if (prev && prev[key] !== val) { span.classList.remove('pulse'); void span.offsetWidth; span.classList.add('pulse'); }
    }
    function renderRail(order) {
      const host = $('railSlots');
      const list = (order || []).filter(pid => charById[pid] && !charById[pid].is_ko);
      // FLIP: remember current positions before reordering.
      const oldTop = {};
      Object.values(railSlotEls).forEach(el => { if (el.parentElement) oldTop[el.dataset.pid] = el.getBoundingClientRect().top; });
      list.forEach((pid, idx) => {
        const c = charById[pid], el = slotFor(pid), st = c.stats || {};
        el.classList.toggle('team-a', c.team_id === 'team_a');
        el.classList.toggle('team-b', c.team_id === 'team_b');
        el.querySelector('.order').textContent = idx + 1;
        el.querySelector('.portrait').style.backgroundImage = c.png ? ('url(' + c.png + ')') : 'none';
        el.querySelector('.who').textContent = shortName(c.name);
        setStat(el.querySelector('.s-p'), '💪', st.power, pid, 'power');
        setStat(el.querySelector('.s-s'), '⚡', st.speed, pid, 'speed');
        setStat(el.querySelector('.s-w'), '🌀', st.weird, pid, 'weird');
        prevStatsById[pid] = st;
        host.appendChild(el);          // re-append in acting order
      });
      Object.keys(railSlotEls).forEach(pid => {
        if (!list.includes(pid) && railSlotEls[pid].parentElement) railSlotEls[pid].remove();
      });
      // FLIP: play the position deltas.
      list.forEach(pid => {
        const el = railSlotEls[pid], prev = oldTop[pid];
        if (prev == null) return;
        const dy = prev - el.getBoundingClientRect().top;
        if (dy) {
          el.style.transition = 'none'; el.style.transform = 'translateY(' + dy + 'px)';
          requestAnimationFrame(() => { el.style.transition = 'transform .35s ease'; el.style.transform = ''; });
        }
      });
      $('gremlins').textContent = Object.values(charById).filter(c => c.is_gremlin).map(() => '👺').join('');
    }
    function speedOrder() {
      return Object.values(charById).filter(c => !c.is_ko)
        .sort((a, b) => (b.stats && b.stats.speed || 0) - (a.stats && a.stats.speed || 0)
          || (a.player_id < b.player_id ? -1 : 1))
        .map(c => c.player_id);
    }
    function updateMeters(meters) {
      if (!meters) return;
      $('knotHp').style.left = (clamp01(meters.hp_share) * 100) + '%';
      $('knotAud').style.left = (clamp01(meters.audience) * 100) + '%';
    }

    const DISP = { lobby: 'block', stage: 'grid', over: 'block' };
    function view(which) {
      for (const id of ['lobby', 'stage', 'over']) {
        $(id).style.display = (id === which) ? DISP[id] : 'none';
      }
    }

    function typewrite(el, text) {
      el.classList.remove('muted');
      let i = 0; el.textContent = '';
      clearInterval(el._tw);
      el._tw = setInterval(() => {
        el.textContent = text.slice(0, ++i);
        if (i >= text.length) clearInterval(el._tw);
      }, 18);
    }

    // ---- reveal sequencer ----
    function runReveal(payload) {
      const beats = payload.beats || [];
      const pngs = payload.action_pngs || {};
      const finalById = {};
      (payload.characters || []).forEach(c => finalById[c.player_id] = c);
      let i = 0, timer = null;
      $('nextBtn').classList.remove('hidden');
      $('roundHead').textContent = 'ROUND ' + payload.round;
      $('roundTitle').textContent = payload.round_title ? ('“' + payload.round_title + '”') : '';
      $('status').textContent = 'reveal';
      (payload.characters || []).forEach(upsert);
      renderRail(payload.initiative_order || speedOrder());   // the round's acting order
      updateMeters(payload.meters);

      function applyFinal(pid) {
        const c = finalById[pid]; if (!c) return;
        arena.setHP(c.player_id, c.hp, c.max_hp);
        arena.setConditions(c.player_id, c.conditions);
        if (c.is_ko) arena.ko(c.player_id);
      }
      // The beat's visual effects — shared by the live pass and the slow-mo
      // replay (mult > 1 stretches every animation by the slowmo factor).
      function playEffects(b, mult) {
        if (b.player_id && pngs[b.player_id]) {
          // The acting drawing becomes the sprite and zooms up; it PERSISTS after.
          arena.swapSprite(b.player_id, pngs[b.player_id]);
          arena.actUp(b.player_id, mult);
        }
        (b.floats || []).forEach(f => arena.floatNumber(f.player_id, f.amount, f.kind, f.crit, mult));
        if (b.hurt) arena.impact(b.hurt, 'hit', mult);
        if (b.helped) arena.impact(b.helped, 'helped', mult);
      }
      function wantsReplay(b) {
        if (!REPLAY_CFG.enabled) return false;
        const trig = REPLAY_CFG.triggers || [];
        return (trig.includes('crit') && (b.floats || []).some(f => f.crit))
            || (trig.includes('ko') && b.type === 'ko');
      }
      function comboSplash(name) {
        const sp = $('comboSplash');
        sp.querySelector('.combotext').textContent = '💥 COMBO! ' + name;
        sp.classList.remove('show'); void sp.offsetWidth; sp.classList.add('show');
        clearTimeout(sp._h); sp._h = setTimeout(() => sp.classList.remove('show'), SPLASH_MS);
      }
      function playNext() {
        $('replayBanner').classList.remove('show');
        if (i >= beats.length) return finish();
        const b = beats[i++];
        typewrite($('capText'), b.text);
        if (b.combo_name) comboSplash(b.combo_name);
        playEffects(b, 1);
        [b.player_id, b.target_id, b.hurt, b.helped].forEach(p => { if (p) applyFinal(p); });
        clearTimeout(timer);
        timer = setTimeout(wantsReplay(b) ? () => playReplay(b) : playNext, BEAT_MS);
      }
      // Crit/KO beats replay once in slow-mo with the REPLAY banner (config
      // instant_replay) — pure presentation over the same beat data.
      function playReplay(b) {
        const mult = REPLAY_CFG.slowmo_factor || 2;
        $('replayBanner').classList.add('show');
        playEffects(b, mult);
        clearTimeout(timer);
        timer = setTimeout(playNext, BEAT_MS);
      }
      function finish() {
        clearTimeout(timer); arena.settleAll();
        $('replayBanner').classList.remove('show');
        arena.render(payload.characters || []);   // settle to final state
        (payload.characters || []).forEach(upsert);
        renderRail(speedOrder());          // drop anyone KO'd during the round
        $('nextBtn').classList.add('hidden');
        $('capText').classList.add('muted');
        $('capText').textContent = SCHEMING[Math.floor(Math.random() * SCHEMING.length)];
        sock.send('next_beat');
      }
      seq = { advance: () => { clearTimeout(timer); playNext(); }, stop: () => clearTimeout(timer) };
      playNext();
    }

    // ---- messages ----
    function onMessage(m) {
      if (m.type === 'joined') {
        localStorage.setItem('hostroom', m.payload.room);
        $('code').textContent = m.payload.room;
        $('joinurl').textContent = joinBase() + '/play?room=' + m.payload.room;
      } else if (m.type === 'lobby_state') {
        $('players').innerHTML = (m.payload.players || []).map(p => {
          const t = (m.payload.teams || []).find(t => t.id === p.team_id) || { color: '#666' };
          return '<span class="pill" style="background:' + t.color + '">' + p.name
            + (p.connected ? '' : ' 💤') + '</span>';
        }).join('');
        $('startBtn').disabled = !m.payload.can_start;
      } else if (m.type === 'phase_change') {
        if (m.payload.phase === 'draw_characters') {
          view('stage'); $('roundHead').textContent = 'Doodle Brawl';
          $('status').textContent = 'drawing fighters…';
          $('capText').classList.add('muted'); $('capText').textContent = 'Character creation';
        } else if (m.payload.phase === 'draw_action') {
          view('stage'); if (seq) seq.stop();
          $('roundHead').textContent = 'ROUND ' + m.payload.round;
          $('status').textContent = 'drawing…';
          $('capText').classList.add('muted'); $('capText').textContent = 'Choose your move!';
          $('nextBtn').classList.add('hidden');
        }
      } else if (m.type === 'arena_state') {
        const chars = m.payload.characters || [];
        chars.forEach(upsert);
        if (!arena.zoneIds.length) arena.setup(m.payload.zones || []);
        if (chars.length) view('stage');
        arena.render(chars);
        renderRail(speedOrder());          // rail visible during drawing phases too
      } else if (m.type === 'reveal_step') {
        runReveal(m.payload);
      } else if (m.type === 'game_over') {
        view('over');
        const w = m.payload.winner_team_id;
        $('overTitle').textContent = w ? '🏆 ' + w + ' wins!' : 'Draw!';
        $('overMsg').textContent = 'Thanks for playing Doodle Brawl.';
      } else if (m.type === 'toast') {
        const t = $('toast');
        t.textContent = m.payload.message || '';
        t.classList.add('show');
        clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), 6000);
      }
    }

    // ---- boot ----
    arena = new Arena($('arena'));
    $('startBtn').onclick = () => sock.send('start_game');
    $('nextBtn').onclick = () => { if (seq) seq.advance(); };
    sock = DoodleSocket({
      onStatus: (s) => $('banner').classList.toggle('show', s === 'offline'),
      onOpen: (api) => api.send('join', {
        role: 'host',
        room: localStorage.getItem('hostroom') || undefined,
        player_id: localStorage.getItem('hostpid'),
      }),
      onMessage: (m, api) => { if (m.type === 'joined') localStorage.setItem('hostpid', m.payload.player_id); onMessage(m); },
    });
  })();
  </script>
</body>
</html>
